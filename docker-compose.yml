services:

  redis:
    image: redis:7.4-alpine

    container_name: dark-guard-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dark-guard-net


  qdrant:
    image: qdrant/qdrant:v1.12.0

    container_name: dark-guard-qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

    networks:
      - dark-guard-net


  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend

    container_name: dark-guard-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

    volumes:
      - ./backend:/app/backend
      - ./agents:/app/agents
      - ./vector_store:/app/vector_store
      - sqlite_data:/app/data

    networks:
      - dark-guard-net


  mcp_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp

    container_name: dark-guard-mcp

    restart: unless-stopped

    ports:
      - "8001:8001"

    env_file:
      - .env

    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      BACKEND_URL: http://backend:8000

    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      backend:
        condition: service_started

    volumes:
      - ./mcp_server:/app/mcp_server
      - ./backend:/app/backend
      - ./agents:/app/agents
      - ./config.py:/app/config.py

    networks:
      - dark-guard-net


volumes:
  redis_data:
  qdrant_data:
  sqlite_data:


networks:
  dark-guard-net:
    driver: bridge